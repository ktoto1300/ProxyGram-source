name: Build ProxyGram APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'microsoft'
          cache: gradle

      - name: List Files (Debug)
        run: ls -R

      - name: Install Android NDK
        run: |
          sudo ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;21.4.7075529"
        continue-on-error: true

      - name: Grant execute permission for gradlew
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
          else
            echo "Error: gradlew not found!"
            exit 1
          fi

      - name: Build with Gradle
        run: ./gradlew :TMessagesProj_App:assembleAfatDebug --no-daemon --stacktrace
        env:
          JAVA_OPTS: "-Xmx6g"
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -Dorg.gradle.parallel=false -Dorg.gradle.daemon=false"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ProxyGram-Debug-APK
          path: TMessagesProj_App/build/outputs/apk/afat/debug/*.apk
