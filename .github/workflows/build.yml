name: Build ProxyGram APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'microsoft'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew :TMessagesProj_App:assembleAfatDebug --no-daemon --stacktrace
        env:
          JAVA_OPTS: "-Xmx6g"
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -Dorg.gradle.parallel=false"

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: ProxyGram-Debug-APK
          path: TMessagesProj_App/build/outputs/apk/afat/debug/*.apk
