name: Build ProxyGram APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.6

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Build with Gradle
        run: gradle clean :TMessagesProj_App:assembleAfatDebug --no-daemon --stacktrace
        env:
          JAVA_OPTS: "-Xmx4g"
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=false -Dorg.gradle.daemon=false"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ProxyGram-Debug-APK
          path: "**/*.apk"
