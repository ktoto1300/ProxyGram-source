<!DOCTYPE html>
<html lang="en">
<head>
    <title>Telegram Mod - Download APK</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn { background: #2AABEE; color: white; padding: 15px 30px; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .changelog { text-align: left; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Telegram Mod</h1>
        <p>Standalone Telegram mod with advanced features.</p>
        <img src="https://via.placeholder.com/300x500?text=Screenshot+1" width="150" alt="Screenshot 1">
        <img src="https://via.placeholder.com/300x500?text=Screenshot+2" width="150" alt="Screenshot 2">
        <br><br>
        <a href="https://clk.sh/telegram_mod_apk" class="btn">Download APK</a>

        <div class="changelog">
            <h3>What's New</h3>
            <ul id="changelog-list">
                <li>Loading...</li>
            </ul>
        </div>

        <div style="margin-top: 30px;">
            <!-- Adsterra/PropellerAds placeholders -->
            <div id="ad-banner"></div>
        </div>
    </div>

    <script>
        fetch('https://raw.githubusercontent.com/dg123000123-tech/tg-bridges/main/client-config.json')
            .then(r => r.json())
            .then(data => {
                const list = document.getElementById('changelog-list');
                list.innerHTML = '';
                data.changelog.split('\n').forEach(line => {
                    if (line.trim()) {
                        const li = document.createElement('li');
                        li.textContent = line;
                        list.appendChild(li);
                    }
                });
            });
    </script>
</body>
</html>
